# /etc/nginx/sites-available/guruh.codingtech.uz
#
# Onix Platform - reverse proxy
# Frontend: localhost:20151 (Next.js)
# Backend:  localhost:20150 (FastAPI)
# Domain:   guruh.codingtech.uz
#
# O'rnatish:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/guruh.codingtech.uz
#   sudo ln -sf /etc/nginx/sites-available/guruh.codingtech.uz /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d guruh.codingtech.uz

# HTTP -> HTTPS yo'naltirish
server {
    listen 80;
    listen [::]:80;
    server_name guruh.codingtech.uz;

    # Certbot uchun
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# Asosiy HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name guruh.codingtech.uz;

    # SSL sertifikatlar (certbot o'rnatadi)
    ssl_certificate     /etc/letsencrypt/live/guruh.codingtech.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/guruh.codingtech.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Xavfsizlik headerlari
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    client_max_body_size 25M;

    # Backend API (FastAPI - port 20150)
    location /api/ {
        proxy_pass http://127.0.0.1:20150;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    # FastAPI /docs, /openapi.json
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://127.0.0.1:20150;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (Next.js - port 20151)
    location / {
        proxy_pass http://127.0.0.1:20151;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
