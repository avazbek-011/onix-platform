# ============================================================
# Onix Platform — nginx server bloki
# ============================================================
# Domain: guruh.codingtech.uz
# Frontend: 127.0.0.1:20151 (Next.js)
# Backend:  127.0.0.1:20150 (FastAPI)
#
# Bu fayl boshqa nginx loyihalariga TEGMAYDI - faqat
# guruh.codingtech.uz uchun yangi server bloki qo'shadi.
#
# O'rnatish:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/guruh.codingtech.uz.conf
#   sudo ln -sf /etc/nginx/sites-available/guruh.codingtech.uz.conf \
#               /etc/nginx/sites-enabled/guruh.codingtech.uz.conf
#   sudo nginx -t              # KONFIGURATSIYANI tekshirish (default emas!)
#   sudo nginx -s reload       # graceful reload (boshqa saytlarga zarar bermaydi)
#   sudo certbot --nginx -d guruh.codingtech.uz --non-interactive --agree-tos -m sizning@email.uz
# ============================================================

# HTTP -> HTTPS yo'naltirish (faqat guruh.codingtech.uz uchun)
server {
    listen 80;
    listen [::]:80;
    server_name guruh.codingtech.uz;

    # Let's Encrypt validation (boshqa sayt qatlamiga tegmaydi)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Asosiy HTTPS server (certbot quyidagi SSL satrlarini avtomatik qo'shadi)
# DIQQAT: HTTP/2 ni shu yerda yoqmaymiz - boshqa server bloklarda
# ehtimol yoqilgan; certbot kerak bo'lsa o'zi qo'shadi.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name guruh.codingtech.uz;

    # Logs - alohida fayllarda, boshqa saytlar bilan aralashmasin
    access_log /var/log/nginx/guruh.codingtech.uz.access.log;
    error_log  /var/log/nginx/guruh.codingtech.uz.error.log warn;

    # SSL sertifikatlar - certbot avtomatik to'ldiradi
    # ssl_certificate     /etc/letsencrypt/live/guruh.codingtech.uz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/guruh.codingtech.uz/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Xavfsizlik headerlari (faqat shu sayt uchun)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    client_max_body_size 25M;

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:20150;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    # Swagger docs (ixtiyoriy)
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://127.0.0.1:20150;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:20151;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
